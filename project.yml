name: Potluck
options:
  bundleIdPrefix: io.potluckhub
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "20260615"
    DEVELOPMENT_TEAM: GU9WTSTX9M
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  Potluck:
    type: application
    platform: iOS
    sources:
      - Potluck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.potluckhub.app
        PRODUCT_NAME: Potluck
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: GU9WTSTX9M
    info:
      path: Potluck/Info.plist
      properties:
        CFBundleDisplayName: Potluck
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "20260615"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleDarkContent
